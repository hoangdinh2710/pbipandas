name: Auto Version & Tag

on:
  push:
    branches:
      - main  # Trigger on pushes to main
    paths-ignore:
      - pyproject.toml
      - pbipandas/__init__.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for tags and history
          ref: ${{ github.ref_name }}
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bump-my-version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate version metadata
        id: current_version
        run: |
          CURRENT_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          pyproject_text = Path("pyproject.toml").read_text(encoding="utf-8")
          init_text = Path("pbipandas/__init__.py").read_text(encoding="utf-8")

          project_match = re.search(r'^version\s*=\s*"([^"]+)"', pyproject_text, re.MULTILINE)
          current_match = re.search(r'^current_version\s*=\s*"([^"]+)"', pyproject_text, re.MULTILINE)
          package_match = re.search(r'__version__\s*=\s*"([^"]+)"', init_text)

          if not project_match or not current_match:
            raise SystemExit("Could not parse version metadata from pyproject.toml")

          if not package_match:
            raise SystemExit("Could not find __version__ in pbipandas/__init__.py")

          project_version = project_match.group(1)
          configured_version = current_match.group(1)
          package_version = package_match.group(1)
          versions = {
            "project.version": project_version,
            "tool.bump-my-version.current_version": configured_version,
            "pbipandas.__version__": package_version,
          }

          if len(set(versions.values())) != 1:
            for name, value in versions.items():
              print(f"{name}={value}")
            raise SystemExit("Version metadata is inconsistent. Align all version fields before running release automation.")

          print(project_version)
          PY
          )
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      - name: Determine bump type from commit messages
        id: bump
        run: |
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"
          
          # Get commits since last tag
          COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          echo "Commits since last tag:"
          echo "$COMMITS"

          # Determine bump type based on conventional commits
          if echo "$COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
            echo "BUMP=major" >> $GITHUB_ENV
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^feat"; then
            echo "BUMP=minor" >> $GITHUB_ENV
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^fix|^docs|^style|^refactor|^perf|^test|^chore"; then
            echo "BUMP=patch" >> $GITHUB_ENV
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "No conventional commits found, defaulting to patch"
            echo "BUMP=patch" >> $GITHUB_ENV
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump_version
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.current_version }}"
          BUMP=${BUMP:-patch}
          echo "Bumping version ($BUMP)"
          
          bump-my-version bump "$BUMP" --message "chore: bump version to {new_version}"
          
          NEW_VERSION=$(python - <<'PY'
            import re
            from pathlib import Path

            pyproject_text = Path("pyproject.toml").read_text(encoding="utf-8")
            match = re.search(r'^version\s*=\s*"([^"]+)"', pyproject_text, re.MULTILINE)

            if not match:
              raise SystemExit("Could not parse project version from pyproject.toml")

            print(match.group(1))
          PY
          )

          if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Version bump did not change the project version."
            exit 1
          fi

          if ! git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Expected tag v$NEW_VERSION was not created."
            exit 1
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Push version bump commit and tag
        run: git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
