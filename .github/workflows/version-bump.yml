name: Auto Version & Tag

on:
  push:
    branches:
      - main  # Trigger on pushes to main
    paths-ignore:
      - pyproject.toml
      - pbipandas/__init__.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for tags and history
          ref: ${{ github.ref_name }}
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bump-my-version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate version metadata
        id: current_version
        run: |
          PROJECT_VERSION=$(grep -m1 '^version = "' pyproject.toml | sed 's/^version = "\([^"]*\)"$/\1/')
          CONFIGURED_VERSION=$(grep -m1 '^current_version = "' pyproject.toml | sed 's/^current_version = "\([^"]*\)"$/\1/')
          PACKAGE_VERSION=$(grep -m1 '^__version__ = "' pbipandas/__init__.py | sed 's/^__version__ = "\([^"]*\)"$/\1/')

          if [ -z "$PROJECT_VERSION" ] || [ -z "$CONFIGURED_VERSION" ] || [ -z "$PACKAGE_VERSION" ]; then
            echo "Could not parse version metadata from repository files."
            exit 1
          fi

          if [ "$PROJECT_VERSION" != "$CONFIGURED_VERSION" ] || [ "$CONFIGURED_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "project.version=$PROJECT_VERSION"
            echo "tool.bump-my-version.current_version=$CONFIGURED_VERSION"
            echo "pbipandas.__version__=$PACKAGE_VERSION"
            echo "Version metadata is inconsistent. Align all version fields before running release automation."
            exit 1
          fi

          CURRENT_VERSION="$PROJECT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      - name: Determine bump type from commit messages
        id: bump
        run: |
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"
          
          # Get commits since last tag
          COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          echo "Commits since last tag:"
          echo "$COMMITS"

          # Determine bump type based on conventional commits
          if echo "$COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
            echo "BUMP=major" >> $GITHUB_ENV
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^feat"; then
            echo "BUMP=minor" >> $GITHUB_ENV
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^fix|^docs|^style|^refactor|^perf|^test|^chore"; then
            echo "BUMP=patch" >> $GITHUB_ENV
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "No conventional commits found, defaulting to patch"
            echo "BUMP=patch" >> $GITHUB_ENV
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: bump_version
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.current_version }}"
          BUMP=${BUMP:-patch}
          echo "Bumping version ($BUMP)"
          
          bump-my-version bump "$BUMP" --message "chore: bump version to {new_version}"
          
          NEW_VERSION=$(grep -m1 '^version = "' pyproject.toml | sed 's/^version = "\([^"]*\)"$/\1/')

          if [ -z "$NEW_VERSION" ]; then
            echo "Could not parse project version from pyproject.toml after bump."
            exit 1
          fi

          if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Version bump did not change the project version."
            exit 1
          fi

          if ! git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Expected tag v$NEW_VERSION was not created."
            exit 1
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

      - name: Push version bump commit and tag
        run: git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
